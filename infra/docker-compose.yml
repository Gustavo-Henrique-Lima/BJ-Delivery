services:
  # Bancos

  db-usuario:
    image: postgres:16-alpine
    container_name: db-usuario
    environment:
      POSTGRES_DB: usuario
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: usuario123
    ports:
      - "5442:5432"
    volumes:
      - pg-usuario:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usuario"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-restaurante:
    image: postgres:16-alpine
    container_name: db-restaurante
    environment:
      POSTGRES_DB: restaurante
      POSTGRES_USER: restaurante
      POSTGRES_PASSWORD: restaurante123
    ports:
      - "5433:5432"
    volumes:
      - pg-restaurante:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurante"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-catalogo:
    image: postgres:16-alpine
    container_name: db-catalogo
    environment:
      POSTGRES_DB: catalogo
      POSTGRES_USER: catalogo
      POSTGRES_PASSWORD: catalogo123
    ports:
      - "5434:5432"
    volumes:
      - pg-catalogo:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalogo"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-pedido:
    image: postgres:16-alpine
    container_name: db-pedido
    environment:
      POSTGRES_DB: pedido
      POSTGRES_USER: pedido
      POSTGRES_PASSWORD: pedido123
    ports:
      - "5435:5432"
    volumes:
      - pg-pedido:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pedido"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-pagamento:
    image: postgres:16-alpine
    container_name: db-pagamento
    environment:
      POSTGRES_DB: pagamento
      POSTGRES_USER: pagamento
      POSTGRES_PASSWORD: pagamento123
    ports:
      - "5436:5432"
    volumes:
      - pg-pagamento:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pagamento"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-entrega:
    image: postgres:16-alpine
    container_name: db-entrega
    environment:
      POSTGRES_DB: entrega
      POSTGRES_USER: entrega
      POSTGRES_PASSWORD: entrega123
    ports:
      - "5437:5432"
    volumes:
      - pg-entrega:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entrega"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-avaliacao:
    image: postgres:16-alpine
    container_name: db-avaliacao
    environment:
      POSTGRES_DB: avaliacao
      POSTGRES_USER: avaliacao
      POSTGRES_PASSWORD: avaliacao123
    ports:
      - "5438:5432"
    volumes:
      - pg-avaliacao:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avaliacao"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-keycloak:
    image: postgres:16-alpine
    container_name: db-keycloak
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak123
    ports:
      - "5439:5432"
    volumes:
      - pg-keycloak:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # REDIS — compartilhado entre ms-restaurante, ms-catalogo e ms-entrega

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # KAFKA — mensageria assíncrona entre os microsserviços

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # KEYCLOAK — identity provider com banco PostgreSQL dedicado

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: keycloak
    command: start-dev
    depends_on:
      db-keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8080"

  # OBSERVABILIDADE — tracing, métricas e dashboards

  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    ports:
      - "9411:9411"

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana

# VOLUMES — persistência de dados entre restarts

volumes:
  pg-usuario:
  pg-restaurante:
  pg-catalogo:
  pg-pedido:
  pg-pagamento:
  pg-entrega:
  pg-avaliacao:
  pg-keycloak:
  redis-data:
  grafana-data:
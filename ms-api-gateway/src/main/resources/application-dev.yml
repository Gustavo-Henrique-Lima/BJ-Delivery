spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8180/realms/delivery/protocol/openid-connect/certs
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ms-usuario
              uri: http://127.0.0.1:8081
              predicates:
                - Path=/api/usuarios/**
            - id: ms-restaurante
              uri: http://127.0.0.1:8082
              predicates:
                - Path=/api/restaurantes/**
            - id: ms-catalogo
              uri: http://127.0.0.1:8083
              predicates:
                - Path=/api/catalogo/**
            - id: ms-pedido
              uri: http://127.0.0.1:8084
              predicates:
                - Path=/api/pedidos/**
            - id: ms-pagamento
              uri: http://127.0.0.1:8085
              predicates:
                - Path=/api/pagamentos/**
            - id: ms-entrega
              uri: http://127.0.0.1:8086
              predicates:
                - Path=/api/entregas/**
            - id: ms-avaliacao
              uri: http://127.0.0.1:8087
              predicates:
                - Path=/api/avaliacoes/**
            - id: ms-notificacao
              uri: http://127.0.0.1:8088
              predicates:
                - Path=/api/notificacoes/**

logging:
  level:
    com.bj_food: DEBUG